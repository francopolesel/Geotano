# ─── Render Blueprint ──────────────────────────────────────────────────────
# Backend Web Service only. Frontend is created manually as a Static Site
# from the Render dashboard (Blueprint doesn't support type: static).

services:
  - type: web
    name: geotano-backend
    runtime: node
    repo: https://github.com/francopolesel/Geotano
    plan: free
    region: oregon
    buildCommand: npm install -g pnpm@9 && NODE_ENV=development pnpm install --frozen-lockfile && pnpm --filter=@geotano/backend run build
    startCommand: cd apps/backend && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://geotano-frontend.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
