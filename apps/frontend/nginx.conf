# ─── Geotano Frontend — Nginx SPA configuration ──────────────────────────
# Serves index.html for all non-file routes so React Router handles routing.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Asset files — cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — serve index.html for any non-file route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
